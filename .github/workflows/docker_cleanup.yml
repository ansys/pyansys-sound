name: Docker image cleanup
on:
  schedule:
      # Run on sundays at 02:00 UTC
    - cron: "0 2 * * 0"
  pull_request:
    paths:
        # Run whenever this workflow is modified
      - .github/workflows/docker_cleanup.yml
  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  # List of DPF Sound image tags to NOT delete
  IMAGES_TO_KEEP: '["25.2", "26.1", "latest"]'

jobs:
  cleanup-ghcr:
    name: Cleaning unnecessary docker images in GHCR
    runs-on: ubuntu-latest
    env:
      PACKAGE_DELETION_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      packages: write  # Required to delete images

    steps:
    - name: Perform docker image cleanup - except certain tags
      uses: ansys/actions/hk-package-clean-except@1f4f0896a8e49d3aec2f02ced215b04a32c85f28 # v10.2.7
      with:
        package-name: 'ansys-sound'
        token: ${{ secrets.GITHUB_TOKEN }}
        tags-kept: ${{ env.IMAGES_TO_KEEP }}
        allow-last-days: '15'

  cleanup-self-hosted:
    name: Cleaning unnecessary docker images in self-hosted runner
    runs-on: [self-hosted, Windows, pyansys-sound]
    steps:
      - name: Perform docker image cleanup - except certain tags
        shell: bash
        run: |
          echo "Cleaning ghcr.io/ansys/ansys-sound images"
          image_name="ghcr.io/ansys/ansys-sound"
          keep_tags=$(echo $IMAGES_TO_KEEP | jq -r '.[]')

          images=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "^$image_name:")

          for image in $images; do
            tag="${image##*:}"

            keep=false
            for keep_tag in $keep_tags; do
              if [ "$tag" = "$keep_tag" ]; then
                keep=true
                break
              fi
            done

            if [ "$keep" = true ]; then
              echo "Keeping $image"
            else
              echo "Removing $image"
              docker rmi "$image"
            fi
          done

          echo "Cleaning dangling images"
          docker image prune -f
