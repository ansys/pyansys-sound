name: Docker image cleanup
on:
  schedule:
      # Run on sundays at 02:00 UTC
    - cron: "0 2 * * 0"
  pull_request:
    paths:
        # Run whenever this workflow is modified
      - .github/workflows/docker_cleanup.yml
  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  # List of DPF Sound image tags to NOT delete
  IMAGES_TO_KEEP: '25.2,26.1,latest'

jobs:
  cleanup-ghcr:
    name: Cleaning unnecessary docker images in GHCR
    runs-on: ubuntu-latest
    env:
      PACKAGE_DELETION_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      packages: write  # Required to delete images

    steps:
    - name: Docker image cleanup (GHCR)
      uses: ansys/actions/hk-package-clean-except@73fa84c704bb6691f254cfe4d4b928c338b0d4da # v10.3.0
      with:
        package-name: 'ansys-sound'
        token: ${{ secrets.GITHUB_TOKEN }}
        tags-kept: ${{ env.IMAGES_TO_KEEP }}
        allow-last-days: '15'

  cleanup-self-hosted:
    name: Cleaning unnecessary docker images in self-hosted runner
    runs-on: [self-hosted, Windows, pyansys-sound]
    steps:
      - name: Docker image cleanup (self-hosted runner)
        shell: bash
        env:
          IMAGES_TO_KEEP: ${{ env.IMAGES_TO_KEEP }}
        run: |
          image_name="ghcr.io/ansys/ansys-sound"

          # Remove commas in list
          keep_tags_commas="${IMAGES_TO_KEEP}"
          keep_tags=$(echo "$keep_tags_commas" | tr ',' ' ')
          echo "Tags to keep: $keep_tags"

          images=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "^$image_name:" || true)

          if [ -z "$images" ]; then
            echo "No images found for $image_name"
            exit 0
          fi

          for image in $images; do
            tag="${image##*:}"
            echo "Processing image: $image (tag: $tag)"

            keep=false
            for keep_tag in $keep_tags; do
              if [ "$tag" = "$keep_tag" ]; then
                keep=true
                break
              fi
            done

            if [ "$keep" = true ]; then
              echo "✅ Keeping $image"
            else
              echo "❌ Removing $image"
              docker rmi "$image" || echo "Failed to remove $image"
            fi
          done

          echo "Cleaning up dangling images"
          docker image prune -f
